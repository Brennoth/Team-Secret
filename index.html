<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Treino Team Secret</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="header">
        <div class="header_left">
            <figure class="header_logo">
                <img src="assets/img/logos/logo-Guilda.jpg" alt="Logo Guilda">
            </figure>
            <div class="header_text">
                <h1>X-TREINO</h1>
                <p>TEAM SECRET aaaaaaaaa</p>
            </div>
        </div>
    </header>

    <main class="largura-definida">
        <section class="container">

            <div class="controls_wrapper">
                <div class="select_group">
                    <label class="container_title">📅 SELECIONE A SEASON</label>
                    <select class="container_select">
                        <option value="">SELECIONE A SEASON</option>
                        <option value="season1">SEASON 1 - 01/01/2026</option>
                        <option value="season2">SEASON 2 - 15/11/2023</option>
                    </select>
                </div>
            </div>

            <div class="table_wrapper">
                <div class="table_header">
                    <h2>🏆 RANKING <span id="rankingSeason">SEASON</span></h2>
                    <p>📅 <span id="data"></span></p>
                </div>
                <table class="container_table">
                    <thead>
                        <tr>
                            <th>POS</th>
                            <th class="equipe_th">EQUIPE</th>
                            <th>Q</th>
                            <th>AB</th>
                            <th>B!</th>
                            <th>PTS</th>
                        </tr>
                    </thead>
                    <tbody class="container_table_tbody" id="tbody">
                       

                    
                    </tbody>
                </table>
            </div>


            <div class="top_kills_wrapper">
                <div class="top_kills_header">
                    <h2>🎯 TOP KILL - JOGADORES</h2>
                </div>
            
                <div class="top_kills_grid">
                    
                </div>
            </div>




















        </section>
    </main>
    <script src="assets/javascript/script.js"></script>
</body>

</html>
